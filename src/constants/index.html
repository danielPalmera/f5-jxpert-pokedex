<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex - Clases de Hover Autónomas</title>
    <style>
      /* --- CONFIGURACIÓN GENERAL --- */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: #0b0c10;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 40px;
        gap: 25px;
        flex-wrap: wrap;
      }

      /* --- TARJETA BASE ESTÁTICA (Sin color elemental por defecto) --- */
      .pokemon-card {
        position: relative;
        width: 230px;
        height: 330px;
        border-radius: 22px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        color: white;
        text-align: center;
        background: #1f2833; /* Fondo gris oscuro neutro cuando no hay hover */
        border: 2px solid transparent;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        transition: all 0.3s ease-in-out;
        overflow: hidden;
        cursor: pointer;
      }

      /* Animación física general en hover */
      .pokemon-card:hover {
        transform: translateY(-10px);
      }

      /* Sombra bajo la imagen del Pokémon */
      .pokemon-card img {
        width: 140px;
        height: 140px;
        z-index: 2;
        filter: drop-shadow(0px 12px 10px rgba(0, 0, 0, 0.6));
        transition: transform 0.3s ease;
      }

      .pokemon-card:hover img {
        transform: scale(1.08) translateY(-4px);
      }

      .pokemon-card h2 {
        margin-top: 10px;
        text-transform: capitalize;
        font-size: 1.5rem;
        z-index: 2;
        letter-spacing: 0.5px;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.7);
      }

      .pokemon-card .type-badge {
        background: rgba(255, 255, 255, 0.15);
        padding: 4px 14px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: bold;
        z-index: 2;
        backdrop-filter: blur(4px);
        text-transform: uppercase;
      }

      /* Contenedor interno para efectos visuales */
      .effect-container {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        overflow: hidden;
      }

      /* ==========================================================
       CLASES DE HOVER ELEMENTALES (Autónomas y fusionadas)
       ========================================================== */

      /* 1. BUG */
      .bug:hover {
        background: linear-gradient(135deg, #729f3f 0%, #a8b820 100%);
        border: 2px solid #d2e054;
        box-shadow: 0 0 25px rgba(168, 184, 32, 0.8);
      }

      /* 2. DARK */
      .dark:hover {
        background: linear-gradient(135deg, #141414 0%, #2c2421 100%);
        border: 2px solid #4e4541;
        box-shadow:
          0 0 30px #000,
          inset 0 0 20px rgba(0, 0, 0, 0.8);
      }

      /* 3. DRAGON */
      .dragon:hover {
        background: linear-gradient(
          135deg,
          #021b79 0%,
          #0575e6 50%,
          #b10000 100%
        );
        border: 2px solid #ffd700;
        box-shadow:
          0 0 30px #ff1744,
          inset 0 0 15px #00e5ff;
      }

      /* 4. ELECTRIC */
      .electric:hover {
        background: linear-gradient(135deg, #eed535 0%, #fa1 100%);
        border: 2px solid #fff;
        box-shadow: 0 0 30px #eed535;
        animation: el-shake 0.2s infinite alternate;
      }

      /* 5. FAIRY */
      .fairy:hover {
        background: linear-gradient(135deg, #f4b1f4 0%, #fdb9e9 100%);
        border: 2px solid #fff;
        box-shadow:
          0 0 30px #f4b1f4,
          inset 0 0 15px #fff;
      }

      /* 6. FIGHTING */
      .fighting:hover {
        background: linear-gradient(135deg, #800000 0%, #d56723 100%);
        border: 2px solid #ff8a50;
        box-shadow: 0 0 25px #d56723;
      }

      /* 7. FIRE */
      .fire:hover {
        background: linear-gradient(135deg, #b71c1c 0%, #ff5722 100%);
        border: 2px solid #ffcc00;
        box-shadow: 0 0 30px #ff5722;
      }
      .fire .effect-container::before {
        content: "";
        position: absolute;
        background: rgba(255, 193, 7, 0.6);
        border-radius: 50%;
        bottom: -10px;
        left: 45%;
        width: 15px;
        height: 15px;
        opacity: 0;
      }
      .fire:hover .effect-container::before {
        animation: fire-up 1s infinite linear;
      }

      /* 8. FLYING */
      .flying:hover {
        background: linear-gradient(135deg, #4a90e2 0%, #bdbdbd 100%);
        border: 2px solid #fff;
        box-shadow: 0 0 25px #4a90e2;
      }

      /* 9. GHOST */
      .ghost:hover {
        background: linear-gradient(135deg, #4c2882 0%, #705898 100%);
        border: 2px solid #a482df;
        box-shadow: 0 0 30px #705898;
        animation: ghost-levitate 2s infinite ease-in-out;
      }

      /* 10. GRASS */
      .grass:hover {
        background: linear-gradient(135deg, #2e7d32 0%, #7cb342 100%);
        border: 2px solid #aeed4f;
        box-shadow: 0 0 30px #7cb342;
        transform: scale(1.03) translateY(-10px);
      }

      /* 11. GROUND */
      .ground:hover {
        background: linear-gradient(135deg, #8b5a2b 0%, #e0c068 100%);
        border: 2px solid #cda750;
        box-shadow: 0 0 25px #e0c068;
      }

      /* 12. ICE */
      .ice:hover {
        background: linear-gradient(135deg, #00838f 0%, #00e5ff 100%);
        border: 2px solid #e0f7fa;
        box-shadow:
          0 0 30px #fff,
          inset 0 0 15px rgba(255, 255, 255, 0.4);
      }
      .ice .effect-container::before {
        content: "";
        position: absolute;
        inset: 0;
        transform: skewX(-30deg) translateX(-150%);
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );
      }
      .ice:hover .effect-container::before {
        animation: ice-flash 1s infinite linear;
      }

      /* 13. NORMAL */
      .normal:hover {
        background: linear-gradient(135deg, #757575 0%, #a8a878 100%);
        border: 2px solid #e0e0e0;
        box-shadow: 0 0 20px #a8a878;
      }

      /* 14. POISON */
      .poison:hover {
        background: linear-gradient(135deg, #4a148c 0%, #a040a0 100%);
        border: 2px solid #e040fb;
        box-shadow: 0 0 25px #a040a0;
      }

      /* 15. PSYCHIC */
      .psychic:hover {
        background: linear-gradient(135deg, #ad1457 0%, #f85888 100%);
        border: 2px solid #ff80ab;
        box-shadow: 0 0 30px #f85888;
        animation: psy-shift 0.4s infinite linear;
      }

      /* 16. ROCK */
      .rock:hover {
        background: linear-gradient(135deg, #6d4c41 0%, #b8a038 100%);
        border: 2px solid #d7ccc8;
        box-shadow: 0 0 22px #b8a038;
      }

      /* 17. STEEL */
      .steel:hover {
        background: linear-gradient(135deg, #4f5b66 0%, #b8b8d0 100%);
        border: 2px solid #eceff1;
        box-shadow: 0 0 25px #eceff1;
      }

      /* 18. WATER */
      .water:hover {
        background: linear-gradient(135deg, #1565c0 0%, #6890f0 100%);
        border: 2px solid #33b5e5;
        box-shadow: 0 0 30px #6890f0;
      }
      .water .effect-container::after {
        content: "";
        position: absolute;
        bottom: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 38%;
        opacity: 0;
      }
      .water:hover .effect-container::after {
        opacity: 1;
        animation: water-spin 5s infinite linear;
      }

      /* ==========================================================
       KEYFRAMES CONSERVADOS (Únicamente los usados en hovers)
       ========================================================== */
      @keyframes el-shake {
        0% {
          transform: translateY(-10px);
        }
        100% {
          transform: translate(1px, -9px) rotate(0.5deg);
        }
      }
      @keyframes fire-up {
        0% {
          transform: translateY(0) scale(1);
          opacity: 1;
          filter: blur(1px);
        }
        100% {
          transform: translateY(-180px) scale(0.2);
          opacity: 0;
          filter: blur(3px);
        }
      }
      @keyframes ghost-levitate {
        0%,
        100% {
          transform: translateY(-10px);
        }
        50% {
          transform: translateY(-16px);
          opacity: 0.85;
        }
      }
      @keyframes ice-flash {
        0% {
          transform: skewX(-30deg) translateX(-150%);
        }
        100% {
          transform: skewX(-30deg) translateX(150%);
        }
      }
      @keyframes psy-shift {
        0%,
        100% {
          filter: hue-rotate(0deg);
        }
        50% {
          filter: hue-rotate(15deg);
        }
      }
      @keyframes water-spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
